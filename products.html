<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChocoDel · Products</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body data-page="products.html">

  <div id="topbar"></div>

  <main class="container">
    <header class="page-head d-flex flex-wrap justify-content-between align-items-end gap-3">
      <div>
        <div class="eyebrow">The catalogue</div>
        <h1>Products &amp; stock</h1>
        <p>Everything ChocoDel makes, with live stock levels. Jars marked low or out need attention.</p>
      </div>
      <button class="btn btn-choco" id="addBtn"><i class="bi bi-plus-lg me-1"></i>New product</button>
    </header>

    <!-- search -->
    <div class="card-choco mb-3">
      <div class="card-body-p">
        <div class="row g-2 align-items-center">
          <div class="col-md-7">
            <div class="search-wrap">
              <i class="bi bi-search"></i>
              <input type="search" id="search" class="form-control"
                     placeholder="Search by name, SKU or category…" autocomplete="off">
            </div>
          </div>
          <div class="col-md-5 text-md-end">
            <span class="last-query-hint" id="lastQuery"></span>
          </div>
        </div>
      </div>
    </div>

    <div class="card-choco">
      <div class="card-head">
        <h2 id="resultCount">Products</h2>
      </div>
      <div class="table-responsive">
        <table class="table-choco">
          <thead>
            <tr>
              <th>Product</th><th>Category</th><th class="num">Price</th>
              <th class="num">In stock</th><th>Status</th><th class="text-end">Actions</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </div>

    <footer class="site-footer text-center">Stock updates the moment an order is placed.</footer>
  </main>

  <!-- Add / edit modal -->
  <div class="modal fade" id="productModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <form id="productForm">
          <div class="modal-header">
            <h5 class="modal-title" id="modalTitle">New product</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="p_id">
            <div class="row g-3">
              <div class="col-7">
                <label class="form-label">Name</label>
                <input class="form-control" id="p_name" required placeholder="e.g. Hazelnut Praline Spread 220g">
              </div>
              <div class="col-5">
                <label class="form-label">SKU</label>
                <input class="form-control" id="p_sku" required placeholder="CD-HZL-220">
              </div>
              <div class="col-6">
                <label class="form-label">Category</label>
                <input class="form-control" id="p_category" list="catList" placeholder="Spread">
                <datalist id="catList">
                  <option value="Spread"><option value="Gift Box"><option value="Mini"><option value="Accessory">
                </datalist>
              </div>
              <div class="col-6">
                <label class="form-label">Price (RM)</label>
                <input type="number" step="0.01" min="0" class="form-control" id="p_price" required>
              </div>
              <div class="col-6">
                <label class="form-label">Stock quantity</label>
                <input type="number" min="0" class="form-control" id="p_stock" required>
              </div>
              <div class="col-6">
                <label class="form-label">Reorder level</label>
                <input type="number" min="0" class="form-control" id="p_reorder" value="10">
                <div class="cell-sub mt-1">Flag as “low” at or below this.</div>
              </div>
              <div class="col-12">
                <label class="form-label">Description</label>
                <textarea class="form-control" id="p_desc" rows="2" placeholder="A short, tasty description…"></textarea>
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-ghost" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-choco" id="saveBtn">Save product</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/products.js"></script>
</body>
</html>
