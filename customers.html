<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChocoDel · Customers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body data-page="customers.html">

  <div id="topbar"></div>

  <main class="container">
    <header class="page-head d-flex flex-wrap justify-content-between align-items-end gap-3">
      <div>
        <div class="eyebrow">The little black book</div>
        <h1>Customers</h1>
        <p>Cafés, repeat buyers and gift-givers — who they are and how much they've spent with you.</p>
      </div>
      <button class="btn btn-choco" id="addBtn"><i class="bi bi-person-plus me-1"></i>New customer</button>
    </header>

    <div class="card-choco mb-3">
      <div class="card-body-p">
        <div class="row g-2 align-items-center">
          <div class="col-md-7">
            <div class="search-wrap">
              <i class="bi bi-search"></i>
              <input type="search" id="search" class="form-control" placeholder="Search by name, email or phone…" autocomplete="off">
            </div>
          </div>
          <div class="col-md-5 text-md-end">
            <span class="last-query-hint" id="lastQuery"></span>
          </div>
        </div>
      </div>
    </div>

    <div class="card-choco">
      <div class="card-head"><h2 id="resultCount">Customers</h2></div>
      <div class="table-responsive">
        <table class="table-choco">
          <thead>
            <tr><th>Name</th><th>Contact</th><th>Address</th>
                <th class="num">Orders</th><th class="num">Lifetime spend</th><th class="text-end">Actions</th></tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </div>

    <footer class="site-footer text-center">Customers with orders on record can't be deleted — their history stays intact.</footer>
  </main>

  <!-- Add / edit modal -->
  <div class="modal fade" id="customerModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <form id="customerForm">
          <div class="modal-header">
            <h5 class="modal-title" id="modalTitle">New customer</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="c_id">
            <div class="row g-3">
              <div class="col-12">
                <label class="form-label">Name</label>
                <input class="form-control" id="c_name" required placeholder="e.g. Nurul Izzah Cafe">
              </div>
              <div class="col-6">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" id="c_email" placeholder="name@email.com">
              </div>
              <div class="col-6">
                <label class="form-label">Phone</label>
                <input class="form-control" id="c_phone" placeholder="01x-xxxxxxx">
              </div>
              <div class="col-12">
                <label class="form-label">Address</label>
                <textarea class="form-control" id="c_address" rows="2" placeholder="Street, town, state…"></textarea>
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-ghost" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-choco" id="saveBtn">Save customer</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/customers.js"></script>
</body>
</html>
