<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChocoDel · Orders</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body data-page="orders.html">

  <div id="topbar"></div>

  <main class="container">
    <header class="page-head">
      <div class="eyebrow">The order book</div>
      <h1>Orders</h1>
      <p>Every sale, newest first. Unpaid ones are flagged so you know who still owes.</p>
    </header>

    <div id="unpaidBanner"></div>

    <div class="card-choco mb-3">
      <div class="card-body-p">
        <div class="row g-2 align-items-center">
          <div class="col-md-6">
            <div class="search-wrap">
              <i class="bi bi-search"></i>
              <input type="search" id="search" class="form-control" placeholder="Search by customer or order #…" autocomplete="off">
            </div>
          </div>
          <div class="col-md-6 d-flex gap-2 justify-content-md-end">
            <button class="btn btn-ghost btn-sm filter-btn active" data-filter="all">All</button>
            <button class="btn btn-ghost btn-sm filter-btn" data-filter="paid">Paid</button>
            <button class="btn btn-ghost btn-sm filter-btn" data-filter="unpaid">Unpaid</button>
          </div>
        </div>
      </div>
    </div>

    <div class="card-choco">
      <div class="card-head"><h2 id="resultCount">Orders</h2>
        <span class="last-query-hint" id="lastQuery"></span></div>
      <div class="table-responsive">
        <table class="table-choco">
          <thead>
            <tr><th>Order</th><th>Customer</th><th>Date</th><th class="num">Items</th>
                <th class="num">Total</th><th>Status</th><th class="text-end">Actions</th></tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </div>

    <footer class="site-footer text-center">Voiding an order returns its stock to the shelf.</footer>
  </main>

  <!-- Order detail modal -->
  <div class="modal fade" id="orderModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="orderTitle">Order</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="orderBody"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/orders.js"></script>
</body>
</html>
