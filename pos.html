<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChocoDel · New Order</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body data-page="pos.html">

  <div id="topbar"></div>

  <main class="container">
    <header class="page-head">
      <div class="eyebrow">Front counter</div>
      <h1>Take an order</h1>
      <p>Tap a jar to drop it in the basket. The total, the RM500 discount and 6% SST work themselves out as you go.</p>
    </header>

    <div class="row g-4">
      <!-- Product picker -->
      <div class="col-lg-7">
        <div class="search-wrap mb-3">
          <i class="bi bi-search"></i>
          <input type="search" id="pickSearch" class="form-control" placeholder="Filter the shelf…" autocomplete="off">
        </div>
        <div class="row g-3" id="picker">
          <div class="col-12 text-center text-muted-warm py-4"><span class="spinner-choco me-2"></span>Fetching the shelf…</div>
        </div>
      </div>

      <!-- Basket -->
      <div class="col-lg-5">
        <div class="card-choco" style="position:sticky;top:90px">
          <div class="card-head">
            <h2><i class="bi bi-basket2 me-1"></i>The basket</h2>
            <button class="btn btn-link-quiet btn-sm" id="clearCart">Clear</button>
          </div>
          <div class="card-body-p">
            <div id="cartItems"></div>

            <div id="cartWarnings"></div>

            <div id="cartSummary" class="mt-2"></div>

            <hr class="divider-stitch">

            <div class="mb-3">
              <label class="form-label">Customer</label>
              <select class="form-select" id="customerSelect">
                <option value="">— choose a customer —</option>
              </select>
              <div class="cell-sub mt-1">
                Not listed? <a href="customers.html">Add them first</a>.
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Payment</label>
              <div class="d-flex gap-2">
                <label class="btn btn-ghost flex-fill mb-0">
                  <input type="radio" name="pay" value="paid" class="me-1" checked> Paid
                </label>
                <label class="btn btn-ghost flex-fill mb-0">
                  <input type="radio" name="pay" value="unpaid" class="me-1"> Unpaid
                </label>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Note <span class="text-muted-warm fw-normal">(optional)</span></label>
              <input class="form-control" id="orderNote" placeholder="e.g. Deliver Friday, gift wrap…">
            </div>

            <button class="btn btn-choco w-100" id="checkoutBtn" disabled>
              <i class="bi bi-bag-check me-1"></i>Place order
            </button>
          </div>
        </div>
      </div>
    </div>

    <footer class="site-footer text-center">Stock is checked again at checkout — no overselling.</footer>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/pos.js"></script>
</body>
</html>
